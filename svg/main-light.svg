
	<svg xmlns="http://www.w3.org/2000/svg" fill="none"  height="350" data-theme="light" width="100%">
		<foreignObject width="100%" height="100%">
			<div xmlns="http://www.w3.org/1999/xhtml">
				<style>
		
	:root {
		--color-text-light: #255DF6;
		--color-dot-bg-0-light: #EBEDF0;
		--color-dot-bg-1-light: #A7BEFB;
		--color-dot-bg-2-light: #628BF9;
		--color-dot-bg-3-light: #4071F7;
		--color-dot-bg-4-light: #255DF6;
		--color-dot-border-light: rgb(0 0 0 / 0.06);

		--xcolor-text-dark: #255DF6;
		--color-text-dark: #ec2400;
		--color-dot-bg-0-dark: #171B21;
		--color-dot-bg-1-dark: #152A62;
		--color-dot-bg-2-dark: #2048B3;
		--color-dot-bg-3-dark: #1951EB;
		--color-dot-bg-4-dark: #0048FF;
		--color-dot-border-dark: rgb(0 0 0 / 0.06);

		/* Initial animation offset... */
		--default-delay: 0s;
		--default-duration: 0.1s;
		--default-stagger: 0.05s;

		/* Animation orchestration */
		--animate-in-menu-delay: calc(var(--default-delay) + var(--default-stagger) * 0);
		--animate-in-links-delay: calc(var(--default-delay) + var(--default-stagger) * 1);
		--animate-in-contributions-delay: calc(var(--default-delay) + var(--default-stagger) * 5);
		--animate-in-readme-delay: calc(var(--default-delay) + var(--default-stagger) * 6);
		--animate-in-copy-delay: calc(var(--default-delay) + var(--default-stagger) * 7);
		--animate-in-graph-delay: calc(var(--default-delay) + var(--default-stagger) * 17);
	}

	[data-theme="dark"] {
		--color-text: var(--color-text-dark);
		--color-dot-bg-0: var(--color-dot-bg-0-dark);
		--color-dot-bg-1: var(--color-dot-bg-1-dark);
		--color-dot-bg-2: var(--color-dot-bg-2-dark);
		--color-dot-bg-3: var(--color-dot-bg-3-dark);
		--color-dot-bg-4: var(--color-dot-bg-4-dark);
		--color-dot-border: var(--color-dot-border-dark);
	}

	[data-theme="light"] {
		--color-text: var(--color-text-light);
		--color-dot-bg-0: var(--color-dot-bg-0-light);
		--color-dot-bg-1: var(--color-dot-bg-1-light);
		--color-dot-bg-2: var(--color-dot-bg-2-light);
		--color-dot-bg-3: var(--color-dot-bg-3-light);
		--color-dot-bg-4: var(--color-dot-bg-4-light);
		--color-dot-border: var(--color-dot-border-light);
	}

	*,
	*::before,
	*::after {
		box-sizing: border-box;
	}

	.grid {
		display: grid;
		grid-template-columns: repeat(6, 1fr);
	}

	.wrapper {
		contain: strict;
		block-size: calc(var(--size-height) * 1px);
		container-type: inline-size;
		position: relative;
		overflow: clip;

		font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
		color: var(--color-text);
	}

	/* Hide everything in Firefox by default – show fallback instead */
	@-moz-document url-prefix() {
		.wrapper {
			display: none;
		}
	}

	.label {
		contain: content;
		font-size: 14px;
		font-weight: 600;
	}

	.link {
		contain: content;
		font-size: 14px;
	}

	.fade-in {
		will-change: opacity;
		animation-name: fade-in;
		animation-fill-mode: both;
		animation-duration: var(--duration, var(--default-duration));
		animation-timing-function: var(--ease, ease-out);
		animation-delay: var(--delay, var(--default-delay));
	}

	p {
		constrain: content;
		margin: 0;
	}

	@keyframes fade-in {
		0% {
			opacity: 0;
		}
		100% {
			opacity: 1;
		}
	}

	.shine {
		background-color: var(--color-text);
		background-image: linear-gradient(-75deg,
			rgb(0 0 0 / 0) 0%,
			rgb(255 255 255 / 0.18) 15%,
			rgb(0 0 0 / 0) 25%
		);
		background-size: 200%;
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		background-clip: text;
		text-fill-color: transparent;

		animation-name: shine;
		animation-duration: 14s;
		animation-iteration-count: infinite;
	}

	@keyframes shine {
		0% {
			background-position: 200%;
		}
		10% {
			background-position: 0%;
		}
		to {
			background-position: 0%;
		}
	}


		:root {
			--rows: 6;
			--size-width: 100cqw;
			--size-height: 350;
			--size-dot-gap: 5;
			--size-dot: 24;
			--size-year-gap: 5;
			--size-label-height: 20;
			--duration: 360;
		}

		.wrapper {
			align-items: flex-end;
			grid-template-rows: 1fr auto;
			row-gap: 20px;
            row-gap: 30px;
            xmargin-top: 20px
		}

		.blobs {
			position: absolute;
			inset: 0;
			overflow: hidden;
			pointer-events: none;
			z-index: 0;
			opacity: 0;
			animation: fade-in 4s ease-out 0.5s forwards;
		}
		.blob {
			position: absolute;
			border-radius: 50%;
			filter: blur(60px);
			opacity: 0.12;
			will-change: transform;
		}
		.blob--1 {
			width: 300px;
			height: 300px;
			background: var(--color-dot-bg-4);
			top: -50px;
			right: -50px;
			animation: morph-1 20s ease-in-out infinite;
		}
		.blob--2 {
			width: 200px;
			height: 200px;
			background: var(--color-dot-bg-3);
			bottom: 20px;
			left: -30px;
			animation: morph-2 25s ease-in-out infinite;
		}
		.blob--3 {
			width: 150px;
			height: 150px;
			background: var(--color-dot-bg-2);
			top: 40%;
			left: 50%;
			animation: morph-3 18s ease-in-out infinite;
		}
		@keyframes morph-1 {
			0%, 100% { transform: translate(0, 0) scale(1); }
			33% { transform: translate(-40px, 30px) scale(1.1); }
			66% { transform: translate(20px, -20px) scale(0.9); }
		}
		@keyframes morph-2 {
			0%, 100% { transform: translate(0, 0) scale(1); }
			33% { transform: translate(50px, -20px) scale(1.15); }
			66% { transform: translate(-30px, 10px) scale(0.85); }
		}
		@keyframes morph-3 {
			0%, 100% { transform: translate(0, 0) scale(1); }
			33% { transform: translate(-30px, 40px) scale(1.2); }
			66% { transform: translate(40px, -30px) scale(0.8); }
		}

		.intro, .graph {
			position: relative;
			z-index: 1;
		}

		.intro {
			contain: content;
			grid-area: 1 / 1 / span 1 / span 6;
			font-size: 18px;
			font-weight: 300;
		}
		.intro span {
			contain: content;
			opacity: 0;
			animation: typewriter-char 0s forwards;
			animation-delay: calc(var(--animate-in-copy-delay) + var(--i) * 25ms);
		}
		.intro .cursor {
			opacity: 0;
			animation: blink-cursor 1s step-end infinite, typewriter-char 0s forwards;
			animation-delay: calc(var(--animate-in-copy-delay) + var(--total-chars) * 25ms), calc(var(--animate-in-copy-delay) + var(--total-chars) * 25ms);
		}
		@keyframes typewriter-char {
			to {
				opacity: 1;
			}
		}
		@keyframes blink-cursor {
			0%, 100% { opacity: 1; }
			50% { opacity: 0; }
		}

		@media (width > 550px) {
			.intro {
				xgrid-area: 1 / 3 / span 1 / span 4;
				grid-area: 1 / 2 / span 1 / span 5
				font-size: 22px;
			}
		}
		@media (width > 700px) {
			.intro {
				xgrid-area: 1 / 4 / span 1 / span 3;
				grid-area: 1 / 2 / span 1 / span 5
			}
		}

		.graph {
			--delay: var(--animate-in-graph-delay);
			grid-area: 2 / 1 / span 1 / span 6;
			margin-bottom: -20px;
			position: relative;
			overflow: hidden;
		}
		.graph__parallax {
			position: absolute;
			inset: 0;
			opacity: 0;
			animation: parallax-scroll 80s linear infinite, fade-in 3s ease-out var(--animate-in-graph-delay) forwards;
			background-image: radial-gradient(circle, var(--color-dot-bg-1) 1px, transparent 1px);
			background-size: 40px 40px;
			background-position: 0 0;
			pointer-events: none;
			z-index: 0;
		}
		@keyframes parallax-scroll {
			0% { background-position: 0 0; }
			100% { background-position: -800px 0; }
		}
		.years {
			--_w: var(--w);
			--_h: calc(var(--h) + var(--size-label-height));

			position: relative;
			z-index: 1;
			display: flex;
			gap: calc(var(--size-year-gap) * 1px);

			contain: strict;
			inline-size: calc(var(--_w) * 1px);
			block-size: calc(var(--_h) * 1px);
			will-change: transform;
			backface-visibility: hidden;
			transform: translateZ(0);

			animation-name: scroll, fade-in;
			animation-timing-function: linear, ease-out;
			animation-duration: calc(30s + (var(--_w) * 0.06s)), 2.5s;
			animation-fill-mode: both, both;
			animation-delay: 2s, var(--animate-in-graph-delay);
		}
		@keyframes scroll {
			0% {
				transform: translateX(60px);
			}
			100% {
				transform: translateX(calc(-100% + 100cqw));
			}
		}

		.year {
			contain: strict;
			content-visibility: auto;
			inline-size: calc(var(--w) * 1px);
			block-size: calc(var(--_h) * 1px);
		}

		.year__label {
			contain: strict;
			block-size: calc(var(--size-label-height) * 1px);
			content-visibility: auto;
			display: flex;
			align-items: end;
		}
		.year__days {
			contain: content;
			display: grid;
			grid-auto-flow: column;
			grid-template-rows: repeat(var(--rows), calc(var(--size-dot) * 1px));
			grid-auto-columns: calc(var(--size-dot) * 1px);
			gap: calc(var(--size-dot-gap) * 1px);

			contain: strict;
			content-visibility: auto;
			inline-size: calc(var(--w) * 1px);
			block-size: calc(var(--h) * 1px);
		}
		.year__days .dot {
			contain: strict;
			content-visibility: auto;
			aspect-ratio: 1;
			inline-size: calc(var(--size-dot) * 1px);
			block-size: calc(var(--size-dot) * 1px);
			border: calc(var(--size-dot) * 0.075 * 1px) solid var(--color-dot-border);
			border-radius: calc(var(--size-dot) * 0.15 * 1px);
			will-change: transform;
			transform: scale(0);
			animation: dot-entrance 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
			animation-delay: calc(var(--animate-in-graph-delay) + var(--dot-i, 0) * 3ms);
		}
		@keyframes dot-entrance {
			0% {
				transform: scale(0);
			}
			100% {
				transform: scale(1);
			}
		}
		.dot--0 { background-color: var(--color-dot-bg-0); }
		.dot--1 { background-color: var(--color-dot-bg-1); }
		.dot--2 { background-color: var(--color-dot-bg-2); }
		.dot--3 {
			background-color: var(--color-dot-bg-3);
			animation: dot-entrance 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, pulse-glow 3s ease-in-out infinite;
			animation-delay: calc(var(--animate-in-graph-delay) + var(--dot-i, 0) * 3ms), calc(var(--animate-in-graph-delay) + var(--dot-i, 0) * 3ms + 0.5s);
		}
		.dot--4 {
			background-color: var(--color-dot-bg-4);
			animation: dot-entrance 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, pulse-glow 2.5s ease-in-out infinite;
			animation-delay: calc(var(--animate-in-graph-delay) + var(--dot-i, 0) * 3ms), calc(var(--animate-in-graph-delay) + var(--dot-i, 0) * 3ms + 0.5s);
		}
		@keyframes pulse-glow {
			0%, 100% {
				box-shadow: 0 0 0px 0px transparent;
				filter: brightness(1);
			}
			50% {
				box-shadow: 0 0 calc(var(--size-dot) * 0.4 * 1px) calc(var(--size-dot) * 0.1 * 1px) var(--color-dot-bg-4);
				filter: brightness(1.3);
			}
		}
	</style>
				
		<main class="wrapper grid" style="--total-chars: 238;">
			<div class="blobs">
				<div class="blob blob--1"></div>
				<div class="blob blob--2"></div>
				<div class="blob blob--3"></div>
			</div>
			<article class="intro">
				<p><span style="--i: 0;">I</span><span style="--i: 1;">'</span><span style="--i: 2;">m</span><span style="--i: 3;"> </span><span style="--i: 4;">K</span><span style="--i: 5;">e</span><span style="--i: 6;">n</span><span style="--i: 7;">a</span><span style="--i: 8;">n</span><span style="--i: 9;">,</span><span style="--i: 10;"> </span><span style="--i: 11;">a</span><span style="--i: 12;">n</span><span style="--i: 13;">d</span><span style="--i: 14;"> </span><span style="--i: 15;">I</span><span style="--i: 16;"> </span><span style="--i: 17;">b</span><span style="--i: 18;">u</span><span style="--i: 19;">i</span><span style="--i: 20;">l</span><span style="--i: 21;">d</span><span style="--i: 22;"> </span><span style="--i: 23;">a</span><span style="--i: 24;">d</span><span style="--i: 25;">v</span><span style="--i: 26;">a</span><span style="--i: 27;">n</span><span style="--i: 28;">c</span><span style="--i: 29;">e</span><span style="--i: 30;">d</span><span style="--i: 31;"> </span><span style="--i: 32;">A</span><span style="--i: 33;">I</span><span style="--i: 34;"> </span><span style="--i: 35;">s</span><span style="--i: 36;">y</span><span style="--i: 37;">s</span><span style="--i: 38;">t</span><span style="--i: 39;">e</span><span style="--i: 40;">m</span><span style="--i: 41;">s</span><span style="--i: 42;">.</span><span style="--i: 43;"> </span><span style="--i: 44;">W</span><span style="--i: 45;">i</span><span style="--i: 46;">t</span><span style="--i: 47;">h</span><span style="--i: 48;"> </span><span style="--i: 49;">a</span><span style="--i: 50;"> </span><span style="--i: 51;">s</span><span style="--i: 52;">t</span><span style="--i: 53;">r</span><span style="--i: 54;">o</span><span style="--i: 55;">n</span><span style="--i: 56;">g</span><span style="--i: 57;"> </span><span style="--i: 58;">b</span><span style="--i: 59;">e</span><span style="--i: 60;">l</span><span style="--i: 61;">i</span><span style="--i: 62;">e</span><span style="--i: 63;">f</span><span style="--i: 64;"> </span><span style="--i: 65;">i</span><span style="--i: 66;">n</span><span style="--i: 67;"> </span><span style="--i: 68;">t</span><span style="--i: 69;">h</span><span style="--i: 70;">e</span><span style="--i: 71;"> </span><span style="--i: 72;">f</span><span style="--i: 73;">r</span><span style="--i: 74;">e</span><span style="--i: 75;">e</span><span style="--i: 76;">d</span><span style="--i: 77;">o</span><span style="--i: 78;">m</span><span style="--i: 79;"> </span><span style="--i: 80;">o</span><span style="--i: 81;">f</span><span style="--i: 82;"> </span><span style="--i: 83;">i</span><span style="--i: 84;">n</span><span style="--i: 85;">f</span><span style="--i: 86;">o</span><span style="--i: 87;">r</span><span style="--i: 88;">m</span><span style="--i: 89;">a</span><span style="--i: 90;">t</span><span style="--i: 91;">i</span><span style="--i: 92;">o</span><span style="--i: 93;">n</span><span style="--i: 94;">,</span><span style="--i: 95;"> </span><span style="--i: 96;">m</span><span style="--i: 97;">y</span><span style="--i: 98;"> </span><span style="--i: 99;">r</span><span style="--i: 100;">e</span><span style="--i: 101;">s</span><span style="--i: 102;">e</span><span style="--i: 103;">a</span><span style="--i: 104;">r</span><span style="--i: 105;">c</span><span style="--i: 106;">h</span><span style="--i: 107;"> </span><span style="--i: 108;">b</span><span style="--i: 109;">r</span><span style="--i: 110;">i</span><span style="--i: 111;">d</span><span style="--i: 112;">g</span><span style="--i: 113;">e</span><span style="--i: 114;">s</span><span style="--i: 115;"> </span><span style="--i: 116;">t</span><span style="--i: 117;">h</span><span style="--i: 118;">e</span><span style="--i: 119;"> </span><span style="--i: 120;">g</span><span style="--i: 121;">a</span><span style="--i: 122;">p</span><span style="--i: 123;"> </span><span style="--i: 124;">b</span><span style="--i: 125;">e</span><span style="--i: 126;">t</span><span style="--i: 127;">w</span><span style="--i: 128;">e</span><span style="--i: 129;">e</span><span style="--i: 130;">n</span><span style="--i: 131;"> </span><span style="--i: 132;">n</span><span style="--i: 133;">a</span><span style="--i: 134;">t</span><span style="--i: 135;">u</span><span style="--i: 136;">r</span><span style="--i: 137;">e</span><span style="--i: 138;">-</span><span style="--i: 139;">i</span><span style="--i: 140;">n</span><span style="--i: 141;">s</span><span style="--i: 142;">p</span><span style="--i: 143;">i</span><span style="--i: 144;">r</span><span style="--i: 145;">e</span><span style="--i: 146;">d</span><span style="--i: 147;"> </span><span style="--i: 148;">a</span><span style="--i: 149;">l</span><span style="--i: 150;">g</span><span style="--i: 151;">o</span><span style="--i: 152;">r</span><span style="--i: 153;">i</span><span style="--i: 154;">t</span><span style="--i: 155;">h</span><span style="--i: 156;">m</span><span style="--i: 157;">s</span><span style="--i: 158;"> </span><span style="--i: 159;">a</span><span style="--i: 160;">n</span><span style="--i: 161;">d</span><span style="--i: 162;"> </span><span style="--i: 163;">c</span><span style="--i: 164;">o</span><span style="--i: 165;">m</span><span style="--i: 166;">p</span><span style="--i: 167;">l</span><span style="--i: 168;">e</span><span style="--i: 169;">x</span><span style="--i: 170;"> </span><span style="--i: 171;">a</span><span style="--i: 172;">p</span><span style="--i: 173;">p</span><span style="--i: 174;">l</span><span style="--i: 175;">i</span><span style="--i: 176;">c</span><span style="--i: 177;">a</span><span style="--i: 178;">t</span><span style="--i: 179;">i</span><span style="--i: 180;">o</span><span style="--i: 181;">n</span><span style="--i: 182;">s</span><span style="--i: 183;">,</span><span style="--i: 184;"> </span><span style="--i: 185;">e</span><span style="--i: 186;">n</span><span style="--i: 187;">a</span><span style="--i: 188;">b</span><span style="--i: 189;">l</span><span style="--i: 190;">i</span><span style="--i: 191;">n</span><span style="--i: 192;">g</span><span style="--i: 193;"> </span><span style="--i: 194;">t</span><span style="--i: 195;">h</span><span style="--i: 196;">e</span><span style="--i: 197;"> </span><span style="--i: 198;">e</span><span style="--i: 199;">x</span><span style="--i: 200;">p</span><span style="--i: 201;">l</span><span style="--i: 202;">o</span><span style="--i: 203;">i</span><span style="--i: 204;">t</span><span style="--i: 205;">a</span><span style="--i: 206;">t</span><span style="--i: 207;">i</span><span style="--i: 208;">o</span><span style="--i: 209;">n</span><span style="--i: 210;"> </span><span style="--i: 211;">o</span><span style="--i: 212;">f</span><span style="--i: 213;"> </span><span style="--i: 214;">d</span><span style="--i: 215;">a</span><span style="--i: 216;">t</span><span style="--i: 217;">a</span><span style="--i: 218;"> </span><span style="--i: 219;">f</span><span style="--i: 220;">r</span><span style="--i: 221;">o</span><span style="--i: 222;">m</span><span style="--i: 223;"> </span><span style="--i: 224;">u</span><span style="--i: 225;">n</span><span style="--i: 226;">i</span><span style="--i: 227;">q</span><span style="--i: 228;">u</span><span style="--i: 229;">e</span><span style="--i: 230;"> </span><span style="--i: 231;">a</span><span style="--i: 232;">n</span><span style="--i: 233;">g</span><span style="--i: 234;">l</span><span style="--i: 235;">e</span><span style="--i: 236;">s</span><span style="--i: 237;">.</span><span class="cursor">|</span></p>
			</article>
			<article class="graph">
				<div class="graph__parallax"></div>
				<div class="years" style="--w: 53; --h: 169;">
					
						<div class="year year--0" style="--w: 53; --h: 169;">
							<div class="year__days"><div class="dot dot--0" style="--dot-i: 0;"></div><div class="dot dot--1" style="--dot-i: 1;"></div><div class="dot dot--2" style="--dot-i: 2;"></div><div class="dot dot--3" style="--dot-i: 3;"></div><div class="dot dot--4" style="--dot-i: 4;"></div><div class="dot dot--0" style="--dot-i: 5;"></div><div class="dot dot--1" style="--dot-i: 6;"></div><div class="dot dot--2" style="--dot-i: 7;"></div><div class="dot dot--3" style="--dot-i: 8;"></div><div class="dot dot--4" style="--dot-i: 9;"></div><div class="dot dot--0" style="--dot-i: 10;"></div><div class="dot dot--1" style="--dot-i: 11;"></div></div>
